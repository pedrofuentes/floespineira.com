name: Refresh social feeds

# Pulls the latest YouTube + Instagram posts via official APIs, commits the
# refreshed snapshot, and redeploys. Runs weekly and on demand. Degrades
# gracefully when the API secrets are not configured (keeps the last snapshot).

on:
  schedule:
    - cron: "0 13 * * 1" # Mondays 13:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Sync feeds
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: npm run sync:feeds
      - name: Commit refreshed feeds
        run: |
          git config user.name pedrofuentes
          git config user.email git@pedrofuent.es
          git add src/_data/youtube.json src/_data/instagram.json src/assets/images/yt src/assets/images/ig
          if git diff --cached --quiet; then
            echo "No feed changes to commit."
          else
            git commit -m "chore: refresh social feeds" -m "Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
            git push
          fi
      - name: Build site
        run: npm run build
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
